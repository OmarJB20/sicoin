<div class="catalogo-container">
  <div class="contenedor-catalogo">
    <div *ngIf="productos.length === 0" class="alert alert-info text-center">No hay productos disponibles</div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-3">
      <div class="col" *ngFor="let p of productos">
        <div class="card h-100 catalogo-card">
          <div class="catalogo-img-wrapper">
            <img *ngIf="p.imagen" [src]="p.imagen" alt="{{ p.nombre }}" class="catalogo-img">
            <div *ngIf="!p.imagen" class="catalogo-img-placeholder">
              <i class="bi bi-box-seam"></i>
            </div>
          </div>
          <div class="card-body d-flex flex-column">
            <h6 class="catalogo-nombre mb-1">{{ p.nombre }}</h6>
            <p class="catalogo-descripcion text-muted mb-1">{{ p.descripcion || '' }}</p>
            <p class="catalogo-categoria text-muted small mb-1">{{ p.categoria }}</p>
            <p class="catalogo-precio mt-auto mb-0">${{ p.precio }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
