<div class="productos-container">

  <div class="contenedor-productos">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <div class="input-group input-buscar">
        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" placeholder="Buscar producto o categoría..." [(ngModel)]="busqueda" />
      </div>
      <button class="btn btn-header flex-shrink-0" data-bs-toggle="modal" data-bs-target="#modalProducto" (click)="abrirModalProducto()">
        + Nuevo Producto
      </button>
    </div>

    <div *ngIf="productos.length === 0" class="alert alert-info text-center">No hay productos registrados</div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3">
      <div class="col" *ngFor="let p of productosPaginados">
        <div class="card producto-card h-100">
          <div class="card-body d-flex flex-column">

            <div class="d-flex justify-content-between align-items-start mb-2">
              <h6 class="producto-nombre mb-0">{{ p.nombre }}</h6>
              <div class="dropdown">
                <button class="btn btn-dots" type="button" data-bs-toggle="dropdown">&#x22EE;</button>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li><a class="dropdown-item" (click)="abrirModalProducto(p)" data-bs-toggle="modal" data-bs-target="#modalProducto">Editar</a></li>
                  <li><hr class="dropdown-divider"></li>
                  <li><a class="dropdown-item text-danger" (click)="confirmarEliminarProducto(p)">Eliminar</a></li>
                </ul>
              </div>
            </div>

            <img *ngIf="p.imagen" [src]="p.imagen" alt="{{ p.nombre }}" class="producto-imagen w-100 rounded mb-2" title="{{ p.descripcion || p.nombre }}">

            <p class="text-muted small mb-1">{{ p.categoria || getNombreCategoria(p.categoria_id) }}</p>
            <p class="producto-precio mb-1">${{ p.precio }}</p>

            <div class="d-flex align-items-center gap-2 mt-auto">
              <span class="badge rounded-pill"
                [class.bg-success]="!stockBajo(p) && p.stock > 0"
                [class.bg-warning]="stockBajo(p)"
                [class.bg-secondary]="p.stock === 0">
                Stock: {{ p.stock }}
              </span>
              <span *ngIf="stockBajo(p) && p.stock > 0" class="badge rounded-pill bg-warning text-dark">Stock bajo</span>
              <span *ngIf="p.stock === 0" class="badge rounded-pill bg-danger">Agotado</span>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- Paginación -->
    <nav *ngIf="totalPaginas > 1" class="mt-3">
      <ul class="pagination pagination-sm justify-content-center mb-0">
        <li class="page-item" [class.disabled]="paginaActual === 1">
          <a class="page-link" (click)="cambiarPagina(paginaActual - 1)" href="javascript:void(0)">&laquo;</a>
        </li>
        <li class="page-item" *ngFor="let n of [].constructor(totalPaginas); let i = index" [class.active]="paginaActual === i + 1">
          <a class="page-link" (click)="cambiarPagina(i + 1)" href="javascript:void(0)">{{ i + 1 }}</a>
        </li>
        <li class="page-item" [class.disabled]="paginaActual === totalPaginas">
          <a class="page-link" (click)="cambiarPagina(paginaActual + 1)" href="javascript:void(0)">&raquo;</a>
        </li>
      </ul>
    </nav>

  </div>

</div>

<!-- ═══════ MODAL PRODUCTO ═══════ -->
<div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ editandoProducto ? 'Editar Producto' : 'Nuevo Producto' }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Nombre <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [(ngModel)]="formProducto.nombre" name="prodNombre" required placeholder="Nombre del producto" />
          </div>
          <div class="col-12">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" [(ngModel)]="formProducto.descripcion" name="prodDesc" rows="2" placeholder="Descripción"></textarea>
          </div>
          <div class="col-sm-6">
            <label class="form-label">Precio <span class="text-danger">*</span></label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="formProducto.precio" name="prodPrecio" required placeholder="0.00" />
          </div>
          <div class="col-sm-6">
            <label class="form-label">Categoría <span class="text-danger">*</span></label>
            <select class="form-select" [(ngModel)]="formProducto.categoria_id" name="prodCat" required>
              <option [ngValue]="''" disabled>Seleccionar</option>
              <option *ngFor="let c of categorias" [ngValue]="c.id">{{ c.nombre }}</option>
            </select>
          </div>
          <div class="col-sm-6">
            <label class="form-label">Stock</label>
            <input type="number" class="form-control" [(ngModel)]="formProducto.stock" name="prodStock" placeholder="0" />
          </div>
          <div class="col-sm-6">
            <label class="form-label">Stock mínimo</label>
            <input type="number" class="form-control" [(ngModel)]="formProducto.stock_minimo" min="0" />
          </div>
          <div class="col-12 text-center" *ngIf="formProducto.imagen">
            <img [src]="formProducto.imagen" alt="Vista previa" class="img-preview-modal rounded border mb-2" (error)="formProducto.imagen = ''">
          </div>
          <div class="col-12">
            <label class="form-label">URL de imagen</label>
            <input type="text" class="form-control" [(ngModel)]="formProducto.imagen" name="prodImagen" placeholder="https://..." />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" id="btnCerrarModalProducto">Cancelar</button>
        <button type="button" class="btn btn-guardar" (click)="guardarProducto()">{{ editandoProducto ? 'Guardar Cambios' : 'Crear Producto' }}</button>
      </div>
    </div>
  </div>
</div>
