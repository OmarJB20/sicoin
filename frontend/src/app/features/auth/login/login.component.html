<div class="login-wrapper">
  <div class="login-bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="login-card">
    <div class="login-card-inner">
      <div class="login-header">
        <div class="login-logo">
          <i class="bi bi-boxes"></i>
        </div>
        <h1 class="login-title">SICOIN</h1>
        <p class="login-subtitle">Control de Inventario</p>
      </div>
      <form (ngSubmit)="login()">
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input
              type="email"
              class="form-control"
              [(ngModel)]="correo"
              name="correo"
              required
              placeholder="correo@ejemplo.com"
            />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input
              type="password"
              class="form-control"
              [(ngModel)]="password"
              name="password"
              required
              placeholder="Ingrese su contraseña"
            />
          </div>
        </div>
        <button type="submit" class="btn btn-login w-100">
          <span>Ingresar</span>
          <i class="bi bi-arrow-right"></i>
        </button>
        <div class="text-center mt-3">
          <small>¿No tienes cuenta?
            <a routerLink="/registro" class="text-decoration-none fw-semibold" style="color: var(--primary-dark);">Regístrate aquí</a>
          </small>
        </div>
      </form>
    </div>
  </div>
</div>
