<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 350px;">
    
    <h3 class="text-center mb-3">SICOIN Login</h3>

    <form (ngSubmit)="login()">

      <!-- Correo -->
      <div class="mb-3">
        <label class="form-label">Correo</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="correo"
          name="correo"
          required
        />
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <!-- Botón -->
      <button type="submit" class="btn btn-primary w-100">
        Login
      </button>

    </form>

  </div>
</div>
