<div class="categorias-container">

  <div class="contenedor-categorias">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <span class="fw-semibold text-muted">Total: {{ categorias.length }} categorías</span>
      <button class="btn btn-header flex-shrink-0" data-bs-toggle="modal" data-bs-target="#modalCategoria" (click)="abrirModalCategoria()">
        + Nueva Categoría
      </button>
    </div>

    <div *ngIf="categorias.length === 0" class="alert alert-info text-center">No hay categorías registradas</div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3">
      <div class="col" *ngFor="let c of categorias">
        <div class="card categoria-card h-100">
          <div class="card-body d-flex flex-column">

            <div class="d-flex justify-content-between align-items-start mb-2">
              <h6 class="mb-0">{{ c.nombre }}</h6>
              <div class="dropdown">
                <button class="btn btn-dots" type="button" data-bs-toggle="dropdown">&#x22EE;</button>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li><a class="dropdown-item" (click)="abrirModalCategoria(c)" data-bs-toggle="modal" data-bs-target="#modalCategoria">Editar</a></li>
                  <li><hr class="dropdown-divider"></li>
                  <li><a class="dropdown-item text-danger" (click)="confirmarEliminarCategoria(c)">Eliminar</a></li>
                </ul>
              </div>
            </div>

            <p class="text-muted small mb-0">{{ c.descripcion || 'Sin descripción' }}</p>

          </div>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- ═══════ MODAL CATEGORÍA ═══════ -->
<div class="modal fade" id="modalCategoria" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ editandoCategoria ? 'Editar Categoría' : 'Nueva Categoría' }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Nombre <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [(ngModel)]="formCategoria.nombre" name="catNombre" required placeholder="Nombre de la categoría" />
          </div>
          <div class="col-12">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" [(ngModel)]="formCategoria.descripcion" name="catDesc" rows="2" placeholder="Descripción"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" id="btnCerrarModalCategoria">Cancelar</button>
        <button type="button" class="btn btn-guardar" (click)="guardarCategoria()">{{ editandoCategoria ? 'Guardar Cambios' : 'Crear Categoría' }}</button>
      </div>
    </div>
  </div>
</div>
