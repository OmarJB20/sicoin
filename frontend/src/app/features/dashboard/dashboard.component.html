<div class="dashboard-container">

  <!-- Stats Cards -->
  <div class="stats-grid">

    <div class="stat-card">
      <div class="card-header">
        <span>Total Ventas</span>
        <div class="stat-icon ventas"><i class="bi bi-currency-dollar"></i></div>
      </div>
      <h3>${{ resumen.totalVentas }}</h3>
    </div>

    <div class="stat-card">
      <div class="card-header">
        <span>Stock</span>
        <div class="stat-icon stock"><i class="bi bi-boxes"></i></div>
      </div>
      <h3>{{ resumen.totalStock }}</h3>
    </div>

    <div class="stat-card">
      <div class="card-header">
        <span>Productos</span>
        <div class="stat-icon productos"><i class="bi bi-box-seam"></i></div>
      </div>
      <h3>{{ resumen.totalProductos }}</h3>
    </div>

    <div class="stat-card">
      <div class="card-header">
        <span>Reportes</span>
        <div class="stat-icon reportes"><i class="bi bi-file-text"></i></div>
      </div>
      <h3>{{ resumen.totalReportes }}</h3>
    </div>

  </div>

  <!-- Sección inferior -->
  <div class="bottom-grid">

    <!-- Gráfico Ventas Semanales -->
    <div class="chart-card">

      <h2>Ventas semanales</h2>

      <div class="chart">
        <div class="bar-wrapper" *ngFor="let v of ventasSemanales">
          <div class="bar" [style.height.%]="(v.total / maxVentaSemanal) * 100">
            <span>{{ v.nombre }}</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Gráfico Ventas por Categoría -->
    <div class="chart-card">

      <h2>Ventas por Categoría</h2>

      <div class="chart">
        <div class="bar-wrapper" *ngFor="let c of ventasPorCategoria">
          <div class="bar secondary" [style.height.%]="(c.total / maxVentaCategoria) * 100">
            <span>{{ c.categoria }} ({{ c.porcentaje }}%)</span>
          </div>
        </div>
      </div>

    </div>

  </div>

</div>
