<div class="d-flex position-relative">

  <!-- Sidebar -->
  <div
    class="sidebar text-white p-3 d-flex flex-column"
    [class.sidebar-open]="sidebarOpen"
  >

    <div>

      <div class="text-center mb-4">
        <div class="d-flex align-items-center justify-content-center gap-3">
          <img src="/logo.png" alt="Logo empresa" class="logo-sidebar">
          <img src="/logo-instituto.jpg" alt="Logo instituto" class="logo-sidebar">
        </div>
        <small class="lema-sidebar">CONTRIBUCIÓN</small>
      </div>

      <ul class="nav flex-column">

        <li class="nav-item">
          <a class="nav-link text-white" routerLink="/dashboard">
            Dashboard
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-white" routerLink="/usuarios">
            Usuarios
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-white" routerLink="/productos">
            Productos
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-white" routerLink="/ventas">
            Ventas
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-white" routerLink="/reportes">
            Reportes
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-white" routerLink="/perfil">
            Perfil
          </a>
        </li>

      </ul>

    </div>

    <!-- Botón salir abajo -->
    <div class="mt-auto">

      <button
        class="btn btn-outline-light w-100"
        (click)="logout()"
      >
        Cerrar Sesión
      </button>

    </div>

  </div>

  <!-- Overlay para móvil -->
  <div
    class="sidebar-overlay"
    [class.show]="sidebarOpen"
    (click)="closeSidebar()"
  ></div>

  <!-- Área principal -->
  <div class="flex-grow-1 main-content">

    <!-- Header -->
    <div class="header-sicoin">

      <div class="d-flex align-items-center gap-2">
        <button
          class="btn btn-hamburger d-lg-none"
          (click)="toggleSidebar()"
          aria-label="Toggle sidebar"
        >
          &#9776;
        </button>
        <h2>{{ tituloPagina }}</h2>
      </div>

      <div class="usuario-info">
        <small>Administrador</small>
      </div>

    </div>

    <!-- Contenido -->
    <div class="p-4">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
